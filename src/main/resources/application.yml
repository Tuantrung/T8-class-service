spring:
  application:
    name: class-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classservice}
    username: ${DB_USERNAME:classservice}
    password: ${DB_PASSWORD:classservice}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-32-characters-min!}
    expiry-hours: ${JWT_EXPIRY_HOURS:8}
  pdf:
    export-dir: ${PDF_EXPORT_DIR:/tmp/pdf-exports}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
